<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Microcosmos — Mechanical Ecosystem</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    touch-action: none;
  }
  #c { position: fixed; inset: 0; display: block; background: #000; }
  /* ---- Control panel ---- */
  #panelToggle {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 10px);
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    z-index: 10;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(51,92,103,.55); color: #fff3b0;
    border: 1px solid rgba(255,243,176,.35);
    font: 20px/44px monospace; text-align: center; cursor: pointer;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    touch-action: auto;
  }
  #panel {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 62px);
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    z-index: 9;
    width: min(300px, 82vw);
    max-height: calc(100vh - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px) - 90px);
    overflow-y: auto;
    background: rgba(10,14,16,.78);
    border: 1px solid rgba(224,159,62,.35);
    border-radius: 12px;
    padding: 12px 14px;
    color: #fff3b0;
    font: 12px/1.5 monospace;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: none;
    -webkit-user-select: none;
    touch-action: auto;
  }
  #panel.open { display: block; }
  #panel h3 { margin: 8px 0 4px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #e09f3e; }
  #panel label { display: block; margin: 6px 0 0; }
  #panel .val { float: right; color: #e09f3e; }
  #panel input[type=range] {
    width: 100%; height: 26px; accent-color: #e09f3e; touch-action: auto;
  }
  #panel input[type=number] {
    width: 90px; background: #12181b; color: #fff3b0;
    border: 1px solid #335c67; border-radius: 6px; padding: 4px 6px; font: inherit;
  }
  #panel .btns { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  #panel button {
    flex: 1; min-width: 72px; padding: 8px 6px; cursor: pointer;
    background: #335c67; color: #fff3b0; border: 1px solid rgba(255,243,176,.3);
    border-radius: 8px; font: 11px monospace;
  }
  #panel button:active { background: #9e2a2b; }
  #fps {
    position: fixed;
    left: calc(env(safe-area-inset-left, 0px) + 10px);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
    color: rgba(255,243,176,.4); font: 10px monospace; z-index: 8; pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panelToggle">≡</div>
<div id="panel"></div>
<div id="tip"></div>
<div id="fps"></div>
<script>
"use strict";
/* =====================================================================
   MICROCOSMOS — a contemplative mechanical ecosystem of dots and dashes
   Single-file generative artwork. No audio, no libraries, no network.
   ===================================================================== */

/* ---------------- Seeded RNG (mulberry32) ---------------- */
let SEED = (Math.random() * 1e9) | 0;
let rngState = 0;
function setSeed(s){ rngState = s >>> 0; }
function rnd(){ rngState |= 0; rngState = rngState + 0x6D2B79F5 | 0;
  let t = Math.imul(rngState ^ rngState >>> 15, 1 | rngState);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296; }
function rr(a,b){ return a + rnd()*(b-a); }
function gauss(){ return (rnd()+rnd()+rnd()+rnd()-2)/2; } // approx N(0, .4)
function pick(arr){ return arr[(rnd()*arr.length)|0]; }

/* ---------------- Palette (Dark Sunset) ---------------- */
const PAL = { teal:'#335c67', cream:'#fff3b0', gold:'#e09f3e', red:'#9e2a2b', wine:'#540b0e' };
const PALARR = [PAL.teal, PAL.cream, PAL.gold, PAL.red, PAL.wine];

/* ---------------- Canvas / viewport ---------------- */
const cv = document.getElementById('c');
const ctx = cv.getContext('2d', { alpha:false });
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 250));
resize();

/* ---------------- Global adjustable parameters ---------------- */
const P = {
  repulsion: 1.0, attraction: 1.0, stiffness: 1.0, noise: 1.0,
  speedMul: rr(0.8, 1.3),        // random global speed at start (per spec)
  consumeRate: 1.0, fullness: 1.0, mutation: 1.0,
  divisionRate: 1.0, collideMalf: 0.3,
  producerRate: 1.0, zoom: 1.0, trail: 0.5,
  // initial populations
  nProducer: 4, nCapsule: 14, nScavenger: 8, nVortex: 0,
  nGrabber: 3, nFilament: 10, nInvader: 5, nAbsorber: 4, nFree: 220,
  paused: false,
};

/* ---------------- Particle pool ---------------- */
const MAXP = 4200;
let popCap = 2600;                 // dynamic cap, lowered when FPS drops
const px = new Float32Array(MAXP), py = new Float32Array(MAXP);
const ox = new Float32Array(MAXP), oy = new Float32Array(MAXP); // prev pos (verlet)
const pr = new Float32Array(MAXP);       // radius
const pcol = new Uint8Array(MAXP);       // palette index
const powner = new Int32Array(MAXP);     // automaton id, -1 = free material
const prole = new Uint8Array(MAXP);      // 0 body, 1 membrane, 2 tip/core, 3 arm
const alive = new Uint8Array(MAXP);
const freeList = [];
let liveCount = 0;
for (let i = MAXP-1; i >= 0; i--) freeList.push(i);

function spawnP(x, y, r, col, owner, role){
  if (!freeList.length || liveCount >= popCap) return -1;
  const i = freeList.pop();
  px[i]=ox[i]=x; py[i]=oy[i]=y; pr[i]=r; pcol[i]=col;
  powner[i]=owner; prole[i]=role||0; alive[i]=1; liveCount++;
  return i;
}
function killP(i){
  if (!alive[i]) return;
  alive[i]=0; powner[i]=-2; freeList.push(i); liveCount--;
}
function freeMat(i){ // release particle into environment as free material
  powner[i] = -1; prole[i] = 0; pcol[i] = rnd() < .6 ? 2 : 1;
  pr[i] = Math.min(pr[i], 2.2);
}

/* ---------------- Spatial hash grid ---------------- */
const CELL = 34;
let gcols = 0, grows = 0, ghead = null, gnext = new Int32Array(MAXP);
function gridBuild(){
  gcols = Math.max(1, Math.ceil(W / CELL));
  grows = Math.max(1, Math.ceil(H / CELL));
  const n = gcols * grows;
  if (!ghead || ghead.length !== n) ghead = new Int32Array(n);
  ghead.fill(-1);
  for (let i = 0; i < MAXP; i++){
    if (!alive[i]) continue;
    let cx = (px[i] / CELL)|0, cy = (py[i] / CELL)|0;
    if (cx < 0) cx = 0; else if (cx >= gcols) cx = gcols-1;
    if (cy < 0) cy = 0; else if (cy >= grows) cy = grows-1;
    const c = cy * gcols + cx;
    gnext[i] = ghead[c]; ghead[c] = i;
  }
}
// iterate neighbours of point within ~radius, calling fn(j)
function forNeigh(x, y, rad, fn){
  const x0 = Math.max(0, ((x-rad)/CELL)|0), x1 = Math.min(gcols-1, ((x+rad)/CELL)|0);
  const y0 = Math.max(0, ((y-rad)/CELL)|0), y1 = Math.min(grows-1, ((y+rad)/CELL)|0);
  for (let cy = y0; cy <= y1; cy++)
    for (let cx = x0; cx <= x1; cx++){
      let j = ghead[cy*gcols+cx];
      while (j !== -1){ fn(j); j = gnext[j]; }
    }
}

/* ---------------- Bonds (springs) ---------------- */
// stored per-automaton as flat arrays [a,b,restLen,stiff]
class Bonds {
  constructor(){ this.a=[]; this.b=[]; this.rest=[]; this.k=[]; }
  add(a,b,rest,k){ this.a.push(a); this.b.push(b); this.rest.push(rest); this.k.push(k); }
  removeAt(i){ const n=this.a.length-1;
    this.a[i]=this.a[n]; this.b[i]=this.b[n]; this.rest[i]=this.rest[n]; this.k[i]=this.k[n];
    this.a.pop(); this.b.pop(); this.rest.pop(); this.k.pop(); }
}

/* ---------------- Automaton types ---------------- */
const T = { PRODUCER:0, CAPSULE:1, SCAVENGER:2, VORTEX:3, GRABBER:4,
            FILAMENT:5, INVADER:6, ABSORBER:7, COLLECTIVE:8 };
const TNAME = ['producer','capsule','scavenger','vortex','grabber','filament','invader','absorber','collective'];

// states
const S = { IDLE:0, GATHER:1, FULL:2, SPLIT:3, MALF:4, LYSED:5 };

let autoSeq = 1;
const autos = new Map(); // id -> automaton

class Auto {
  constructor(type, x, y, parent){
    this.id = autoSeq++;
    this.type = type;
    this.x = x; this.y = y;
    this.parts = [];        // particle indices
    this.bonds = new Bonds();
    this.state = S.IDLE;
    this.t = rnd()*10;      // internal clock
    this.splitT = 0; this.malfT = 0;
    this.anchor = null;     // {x,y} for stationary types
    this.host = null;       // for invader
    this.injected = 0;
    this.targetId = 0;
    // ---- per-individual random parameters (§7), mutated from parent ----
    const m = (v, s) => parent ? Math.max(0.15, v * (1 + gauss()*0.12*P.mutation)) : v * rr(1-s, 1+s);
    const pp = parent ? parent.g : null;
    this.g = {
      size:    m(pp ? pp.size    : 1, .25),
      speed:   m(pp ? pp.speed   : 1, .35),
      hunger:  m(pp ? pp.hunger  : 1, .35),
      fullAt:  Math.round(m(pp ? pp.fullAt : baseFull(type), .25)),
      aggro:   m(pp ? pp.aggro   : 1, .4),
      sense:   m(pp ? pp.sense   : 1, .3) * 120,
      cohesion:m(pp ? pp.cohesion: 1, .25),
      leak:    m(pp ? pp.leak    : 1, .4),
      life:    rr(50, 160),
      // random material preference: target type + part role + affinity
      prefType: parent ? pp.prefType : ((rnd()*9)|0),
      prefRole: parent ? pp.prefRole : ((rnd()<.3) ? 2 : (rnd()<.5 ? 1 : 0)),
      affinity: m(pp ? pp.affinity : rr(.3, 1.6), .2),
    };
    this.wob = rnd()*Math.PI*2;
    // expected body radius (used to detach runaway particles)
    this.bodyR = [14, 24, 7, 26, 55, 30, 6, 18, 36][type] * this.g.size;
    autos.set(this.id, this);
    buildBody(this);
  }
}
function baseFull(t){
  return [10, 16, 8, 18, 20, 9, 4, 26, 60][t] || 15;
}

/* ---------------- Body construction per archetype ---------------- */
function ringBody(a, n, rad, r, col, k){
  const ids = [];
  for (let i = 0; i < n; i++){
    const ang = i/n * Math.PI*2;
    const id = spawnP(a.x + Math.cos(ang)*rad, a.y + Math.sin(ang)*rad, r, col, a.id, 1);
    if (id >= 0) ids.push(id);
  }
  const L = 2*rad*Math.sin(Math.PI/ids.length);
  for (let i = 0; i < ids.length; i++){
    a.bonds.add(ids[i], ids[(i+1)%ids.length], L, k);
    a.bonds.add(ids[i], ids[(i+2)%ids.length], 2*rad*Math.sin(2*Math.PI/ids.length), k*.5); // bending
  }
  a.parts.push(...ids);
  return ids;
}
function chainBody(a, n, seg, r, col, k, role){
  const ids = []; let lx = a.x, ly = a.y;
  const ang = rnd()*Math.PI*2;
  for (let i = 0; i < n; i++){
    const id = spawnP(lx, ly, r, col, a.id, role||0);
    if (id >= 0){ ids.push(id); }
    lx += Math.cos(ang)*seg; ly += Math.sin(ang)*seg;
  }
  for (let i = 0; i+1 < ids.length; i++) a.bonds.add(ids[i], ids[i+1], seg, k);
  for (let i = 0; i+2 < ids.length; i++) a.bonds.add(ids[i], ids[i+2], seg*2, k*.35);
  a.parts.push(...ids);
  return ids;
}

function buildBody(a){
  const s = a.g.size, K = 0.9 * a.g.cohesion;
  switch (a.type){
    case T.PRODUCER: { // anchored dot cluster, generates material
      a.anchor = { x:a.x, y:a.y };
      const core = spawnP(a.x, a.y, 4.5*s, 3, a.id, 2);
      if (core >= 0) a.parts.push(core);
      const ring = ringBody(a, 7, 12*s, 2.2*s, 0, K);
      for (const id of ring) a.bonds.add(core, id, 12*s, K*.8);
      break; }
    case T.CAPSULE: { // elongated dash body, filter feeder
      chainBody(a, 6, 7*s, 2.6*s, 0, K);
      pcol[a.parts[0]] = 2; prole[a.parts[0]] = 2; // bright head
      break; }
    case T.SCAVENGER: { // tiny fast triangle
      const ids = ringBody(a, 3, 5*s, 2.0*s, 3, K*1.4);
      if (ids[0] !== undefined) { pcol[ids[0]] = 1; prole[ids[0]] = 2; }
      break; }
    case T.VORTEX: { // crown of arms around a core
      const core = spawnP(a.x, a.y, 4*s, 4, a.id, 2);
      if (core >= 0) a.parts.push(core);
      const arms = 5;
      for (let j = 0; j < arms; j++){
        const ang = j/arms*Math.PI*2;
        let prev = core;
        for (let i = 1; i <= 3; i++){
          const id = spawnP(a.x+Math.cos(ang)*8*i*s, a.y+Math.sin(ang)*8*i*s, 1.9*s, 0, a.id, 3);
          if (id < 0) break;
          a.parts.push(id); a.bonds.add(prev, id, 8*s, K); prev = id;
        }
      }
      break; }
    case T.GRABBER: { // ball with radial hanging arms
      const core = spawnP(a.x, a.y, 5*s, 2, a.id, 2);
      if (core >= 0) a.parts.push(core);
      ringBody(a, 8, 10*s, 2.4*s, 3, K).forEach(id => a.bonds.add(core, id, 10*s, K));
      a.arms = [];
      for (let j = 0; j < 3; j++){
        const arm = []; let prev = core;
        for (let i = 1; i <= 5; i++){
          const id = spawnP(a.x + rr(-4,4), a.y + 10*i*s, 1.8*s, 0, a.id, 3);
          if (id < 0) break;
          a.parts.push(id); a.bonds.add(prev, id, 9*s, K*.7); prev = id; arm.push(id);
        }
        a.arms.push(arm);
      }
      break; }
    case T.FILAMENT: { // anchored dash with luminous tip
      a.anchor = { x:a.x, y:a.y };
      const ids = chainBody(a, 7, 8*s, 1.8*s, 0, K*1.1);
      const tip = ids[ids.length-1];
      if (tip !== undefined){ pcol[tip] = 1; pr[tip] = 3.6*s; prole[tip] = 2; }
      break; }
    case T.INVADER: { // single bright mote
      const id = spawnP(a.x, a.y, 2.4*s, 3, a.id, 2);
      if (id >= 0){ a.parts.push(id); pcol[id] = 3; }
      break; }
    case T.ABSORBER: { // membrane ring, engulfs small assemblies
      ringBody(a, 12, 16*s, 2.6*s, 4, K);
      const core = spawnP(a.x, a.y, 3.5*s, 2, a.id, 2);
      if (core >= 0){ a.parts.push(core);
        for (const id of a.parts) if (id !== core) a.bonds.add(core, id, 16*s, K*.25); }
      break; }
    case T.COLLECTIVE: {
      ringBody(a, 22, 34*s, 2.8*s, 0, K*.8);
      break; }
  }
}

/* ---------------- Helpers ---------------- */
function centroid(a){
  let sx=0, sy=0, n=0;
  for (const i of a.parts){ if (alive[i]){ sx+=px[i]; sy+=py[i]; n++; } }
  if (n){ a.x = sx/n; a.y = sy/n; }
  return n;
}
function nudge(i, fx, fy){ px[i] += fx; py[i] += fy; } // verlet: displacing pos adds velocity
function killAuto(a, release){
  for (const i of a.parts) if (alive[i]){
    if (release) freeMat(i); else killP(i);
  }
  autos.delete(a.id);
}
function disintegrate(a){ killAuto(a, true); }
function stealParticle(a, i){ // automaton a absorbs particle i
  const prev = powner[i];
  if (prev >= 0){
    const v = autos.get(prev);
    if (v){
      const idx = v.parts.indexOf(i);
      if (idx >= 0) v.parts.splice(idx, 1);
      // remove bonds referencing i
      for (let b = v.bonds.a.length-1; b >= 0; b--)
        if (v.bonds.a[b] === i || v.bonds.b[b] === i) v.bonds.removeAt(b);
      damage(v, 1);
    }
  }
  powner[i] = a.id; prole[i] = 0;
  a.parts.push(i);
  // loosely bind into body near closest member
  let best=-1, bd=1e9;
  for (const j of a.parts){ if (j===i||!alive[j]) continue;
    const d=(px[j]-px[i])**2+(py[j]-py[i])**2; if (d<bd){bd=d;best=j;} }
  if (best>=0) a.bonds.add(i, best, Math.sqrt(bd)*.6+4, .5*a.g.cohesion);
}
function damage(a, amt){
  a.hp = (a.hp === undefined ? 6 : a.hp) - amt;
  if (a.state !== S.SPLIT){
    a.state = S.MALF; a.malfT = rr(3,7);
  }
}

/* ---------------- Split (fission) ---------------- */
function trySplit(a){
  if (a.state === S.SPLIT || a.type === T.PRODUCER || a.type === T.FILAMENT) return;
  if (a.parts.length >= a.g.fullAt * P.fullness / Math.max(.1, P.divisionRate)){
    a.state = S.SPLIT; a.splitT = 3.2;
  }
}
function doSplit(a){
  // divide particles by side of centroid axis
  centroid(a);
  const ang = rnd()*Math.PI*2, nx = Math.cos(ang), ny = Math.sin(ang);
  const left = [], right = [];
  for (const i of a.parts) if (alive[i])
    (((px[i]-a.x)*nx + (py[i]-a.y)*ny) < 0 ? left : right).push(i);
  const type = a.type === T.COLLECTIVE ? T.ABSORBER : a.type;
  killChildBodyless(a);
  spawnChild(type, left, a);
  spawnChild(type, right, a);
}
function killChildBodyless(a){ autos.delete(a.id); }
function spawnChild(type, ids, parent){
  if (!ids.length) return;
  let sx=0,sy=0; for (const i of ids){ sx+=px[i]; sy+=py[i]; }
  const child = new Auto(type, sx/ids.length, sy/ids.length, parent);
  // child built a fresh body; absorb the inherited material into it
  for (const i of ids){
    if (child.parts.length < baseFull(type)*2 && alive[i]){
      powner[i] = child.id; child.parts.push(i);
    } else if (alive[i]) freeMat(i);
  }
  child.state = S.IDLE;
}

/* ---------------- World population ---------------- */
function seedWorld(){
  // clear
  for (let i = 0; i < MAXP; i++) if (alive[i]) killP(i);
  autos.clear(); autoSeq = 1;
  setSeed(SEED);
  P.speedMul = rr(0.8, 1.3);
  const sp = (t, n) => { for (let i = 0; i < n; i++)
    new Auto(t, rr(30, W-30), rr(30, H-30), null); };
  sp(T.PRODUCER, P.nProducer);
  sp(T.FILAMENT, P.nFilament);
  sp(T.CAPSULE, P.nCapsule);
  sp(T.SCAVENGER, P.nScavenger);
  sp(T.VORTEX, P.nVortex);
  sp(T.GRABBER, P.nGrabber);
  sp(T.INVADER, P.nInvader);
  sp(T.ABSORBER, P.nAbsorber);
  for (let i = 0; i < P.nFree; i++)
    spawnP(rr(0,W), rr(0,H), rr(1.2,2.4), rnd()<.6?2:1, -1, 0);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
}

/* ---------------- Physics step ---------------- */
const REP_R = 10;
function physics(dt){
  const damp = Math.pow(0.86, dt*60/60); // viscous medium
  const noise = 0.12 * P.noise;
  // verlet integrate + brownian + damping
  for (let i = 0; i < MAXP; i++){
    if (!alive[i]) continue;
    let vx = (px[i]-ox[i]) * damp, vy = (py[i]-oy[i]) * damp;
    const sp = Math.hypot(vx,vy);
    if (sp > 6){ vx *= 6/sp; vy *= 6/sp; }  // clamp
    ox[i] = px[i]; oy[i] = py[i];
    px[i] += vx + (rnd()-.5)*noise;
    py[i] += vy + (rnd()-.5)*noise;
    // soft world bounds
    if (px[i] < 8) px[i] += (8-px[i])*.1; else if (px[i] > W-8) px[i] -= (px[i]-W+8)*.1;
    if (py[i] < 8) py[i] += (8-py[i])*.1; else if (py[i] > H-8) py[i] -= (py[i]-H+8)*.1;
  }
  gridBuild();
  // short-range repulsion via grid (each pair once by index order)
  const rep = 0.55 * P.repulsion;
  for (let i = 0; i < MAXP; i++){
    if (!alive[i]) continue;
    const xi = px[i], yi = py[i];
    forNeigh(xi, yi, REP_R, (j)=>{
      if (j <= i || !alive[j]) return;
      let dx = px[j]-xi, dy = py[j]-yi;
      let d2 = dx*dx+dy*dy;
      const minD = (pr[i]+pr[j])*1.5;
      if (d2 > minD*minD || d2 === 0) return;
      const d = Math.sqrt(d2);
      const f = rep * (1 - d/minD) / d;
      // collision-induced dysfunction between distinct automatons
      if (P.collideMalf > 0 && powner[i] >= 0 && powner[j] >= 0 &&
          powner[i] !== powner[j] && rnd() < P.collideMalf * 0.0012){
        const A = autos.get(rnd() < .5 ? powner[i] : powner[j]);
        if (A) damage(A, 1);
      }
      dx *= f; dy *= f;
      nudge(i, -dx, -dy); nudge(j, dx, dy);
    });
  }
  // bond springs
  for (const a of autos.values()){
    const b = a.bonds, stiff = 0.5 * P.stiffness;
    for (let k = b.a.length-1; k >= 0; k--){
      const i = b.a[k], j = b.b[k];
      if (!alive[i] || !alive[j] || powner[i] !== a.id || powner[j] !== a.id){ b.removeAt(k); continue; }
      let dx = px[j]-px[i], dy = py[j]-py[i];
      const d = Math.hypot(dx,dy) || 1e-4;
      const diff = (d - b.rest[k]) / d * b.k[k] * stiff * 0.5;
      // membrane tension break
      if (d > b.rest[k]*3.4 && rnd() < .3){ b.removeAt(k);
        if (rnd() < .4){ // particle escapes as free material
          const esc = rnd()<.5?i:j;
          const idx = a.parts.indexOf(esc);
          if (idx>=0 && prole[esc]!==2){ a.parts.splice(idx,1); freeMat(esc); damage(a,1); }
        }
        continue; }
      dx *= diff; dy *= diff;
      nudge(i, dx * P.attraction, dy * P.attraction);
      nudge(j, -dx * P.attraction, -dy * P.attraction);
    }
  }
}

/* ---------------- Behaviour (state machines) ---------------- */
function nearestAuto(a, filter, maxD){
  let best = null, bd = maxD*maxD;
  for (const v of autos.values()){
    if (v === a || !filter(v)) continue;
    const d = (v.x-a.x)**2 + (v.y-a.y)**2;
    if (d < bd){ bd = d; best = v; }
  }
  return best;
}
function moveToward(a, tx, ty, f){
  const dx = tx-a.x, dy = ty-a.y, d = Math.hypot(dx,dy)||1;
  const s = f * a.g.speed * P.speedMul / d;
  for (const i of a.parts) if (alive[i]) nudge(i, dx*s, dy*s);
}
function absorbFreeNear(a, cx, cy, rad, pull){
  let got = 0;
  forNeigh(cx, cy, rad, (j)=>{
    if (powner[j] !== -1 || !alive[j]) return;
    const dx = cx-px[j], dy = cy-py[j], d = Math.hypot(dx,dy);
    if (d > rad) return;
    if (d < 7*P.consumeRate*a.g.hunger + 4){ stealParticle(a, j); got++; }
    else if (pull) nudge(j, dx/d*pull, dy/d*pull);
  });
  return got;
}

function behave(a, dt){
  a.t += dt;
  const n = centroid(a);
  if (n === 0){ autos.delete(a.id); return; }

  // runaway particles: anything beyond ~3x the body radius detaches as free material
  const limit2 = (a.bodyR * 3 + 24) ** 2;
  for (let k = a.parts.length - 1; k >= 0; k--){
    const i = a.parts[k];
    if (!alive[i]){ a.parts.splice(k,1); continue; }
    if ((px[i]-a.x)**2 + (py[i]-a.y)**2 > limit2){
      a.parts.splice(k,1);
      for (let b = a.bonds.a.length-1; b >= 0; b--)
        if (a.bonds.a[b] === i || a.bonds.b[b] === i) a.bonds.removeAt(b);
      freeMat(i);
    }
  }

  /* ---- state timers ---- */
  if (a.state === S.MALF){
    a.malfT -= dt;
    // leak: shed a particle periodically
    if (rnd() < dt * 0.8 * a.g.leak && a.parts.length > 2){
      const i = a.parts.pop();
      if (alive[i]) freeMat(i);
    }
    if (a.parts.length <= Math.max(2, baseFull(a.type)*0.25)){ disintegrate(a); return; }
    if (a.malfT <= 0) a.state = S.IDLE; // recovers
  }
  if (a.state === S.SPLIT){
    a.splitT -= dt;
    // membrane constriction: pull all particles toward the split axis midline
    for (const i of a.parts) if (alive[i]){
      nudge(i, (a.x-px[i])*.012, (a.y-py[i])*.012);
      pr[i] *= (1 + Math.sin(a.t*10)*.004); // pulse
    }
    if (a.splitT <= 0){ doSplit(a); return; }
    return;
  }
  trySplit(a);

  /* ---- archetype behaviours ---- */
  switch (a.type){
    case T.PRODUCER: {
      // anchored; slowly generate material around itself
      for (const i of a.parts) if (alive[i])
        nudge(i, (a.anchor.x + (px[i]-a.x) - px[i])*.05, (a.anchor.y + (py[i]-a.y) - py[i])*.05);
      if (rnd() < dt * 0.9 * P.producerRate * a.g.hunger && liveCount < popCap*.95){
        const ang = rnd()*Math.PI*2;
        spawnP(a.x + Math.cos(ang)*rr(14,26)*a.g.size, a.y + Math.sin(ang)*rr(14,26)*a.g.size,
               rr(1.2,2.2), rnd()<.6?2:1, -1, 0);
      }
      break; }

    case T.CAPSULE: {
      // slow drift + filtration
      a.wob += dt * .4;
      moveToward(a, a.x + Math.cos(a.wob)*40, a.y + Math.sin(a.wob*0.7)*40, .01);
      const got = absorbFreeNear(a, a.x, a.y, 34*a.g.size + a.g.sense*.15, .18);
      a.state = got ? S.GATHER : S.IDLE;
      break; }

    case T.SCAVENGER: {
      // fast erratic; strip edges of large assemblies (respect preference)
      a.wob += dt * rr(2,5);
      const prefer = (v)=> v.parts.length > 12 &&
        (v.type === a.g.prefType ? true : rnd() < .5/a.g.affinity);
      const tgt = nearestAuto(a, prefer, a.g.sense*2.2);
      if (tgt){
        a.state = S.GATHER;
        moveToward(a, tgt.x + Math.cos(a.wob)*30, tgt.y + Math.sin(a.wob)*30, .12*a.g.aggro);
        // bite: steal outermost particle if close
        let far = -1, fd = -1;
        for (const i of tgt.parts) if (alive[i]){
          const dme = (px[i]-a.x)**2+(py[i]-a.y)**2;
          if (dme < 180 && prole[i] !== 2){
            const dc = (px[i]-tgt.x)**2+(py[i]-tgt.y)**2;
            if (dc > fd){ fd = dc; far = i; }
          }
        }
        if (far >= 0 && rnd() < dt*2.4*a.g.hunger*P.consumeRate) stealParticle(a, far);
      } else {
        a.state = S.IDLE;
        moveToward(a, a.x + Math.cos(a.wob)*60, a.y + Math.sin(a.wob*1.3)*60, .08);
      }
      break; }

    case T.VORTEX: {
      // rotate arms, create inward spiral current for free material
      let core = a.parts[0];
      const rad = a.g.sense * 1.1;
      // capacity cap: stop pulling once the vortex is stuffed
      const saturated = a.parts.length > 60;
      forNeigh(a.x, a.y, rad, (j)=>{
        if (powner[j] !== -1 || !alive[j]) return;
        const dx = a.x-px[j], dy = a.y-py[j], d = Math.hypot(dx,dy)||1;
        if (d > rad) return;
        if (saturated) return;
        // radial DOMINANT over tangential -> inward spiral, not stable orbit
        const fr = .35 * (1 - d/rad);
        const ft = .25 * (1 - d/rad);
        nudge(j, dx/d*fr + (-dy/d)*ft, dy/d*fr + (dx/d)*ft);
        // tangential drag: bleeds angular momentum from far-orbiting particles
        if (d > 20) {
          const vx = px[j]-ox[j], vy = py[j]-oy[j];
          const vt = -vy*(dx/d) + vx*(dy/d); // tangential velocity component
          nudge(j, (dy/d)*vt*0.05, -(dx/d)*vt*0.05);
        }
        // much larger capture radius so orbiting material actually gets consumed
        if (d < 25) stealParticle(a, j);
      });
      // slow spin of arms
      for (const i of a.parts) if (alive[i] && prole[i] === 3){
        const dx = px[i]-a.x, dy = py[i]-a.y;
        nudge(i, -dy*.004*P.speedMul, dx*.004*P.speedMul);
      }
      moveToward(a, a.x + Math.cos(a.t*.2)*20, a.y + Math.sin(a.t*.17)*20, .004);
      break; }

    case T.GRABBER: {
      // float above filaments; arms reach down and pull off luminous tips
      moveToward(a, a.x + Math.cos(a.t*.5)*30, Math.min(a.y, H*.55), .015);
      const tgt = nearestAuto(a, v => v.type === T.FILAMENT && v.parts.length > 2, a.g.sense*2);
      if (tgt){
        a.state = S.GATHER;
        moveToward(a, tgt.x, tgt.y - 60, .05*a.g.aggro);
        const tip = tgt.parts[tgt.parts.length-1];
        if (alive[tip] && a.arms){
          const arm = a.arms[0];
          const hand = arm && arm[arm.length-1];
          if (hand !== undefined && alive[hand]){
            const dx = px[tip]-px[hand], dy = py[tip]-py[hand], d = Math.hypot(dx,dy)||1;
            nudge(hand, dx/d*1.1, dy/d*1.1); // extend arm toward tip
            if (d < 10 && rnd() < dt*2.2*P.consumeRate){
              stealParticle(a, tip);           // rip the tip off
              pr[tip] = 2.2; pcol[tip] = 2;
              damage(tgt, 2);                  // filament malfunction + leak
            }
          }
        }
      } else a.state = S.IDLE;
      break; }

    case T.FILAMENT: {
      // anchored base; undulatory wave along the chain; tip glows
      const base = a.parts[0];
      if (alive[base]){
        nudge(base, (a.anchor.x-px[base])*.3, (a.anchor.y-py[base])*.3);
      }
      for (let k = 1; k < a.parts.length; k++){
        const i = a.parts[k];
        if (!alive[i]) continue;
        const ph = a.t*2.2*P.speedMul + k*.8 + a.wob;
        nudge(i, Math.cos(ph)*.16*k*.28, -.05 + Math.sin(ph*.6)*.05);
      }
      // regrow slowly by absorbing free material at the tip
      if (a.parts.length < 8 && a.state !== S.MALF){
        const tip = a.parts[a.parts.length-1];
        if (alive[tip] && absorbFreeNear(a, px[tip], py[tip], 20, .1)){
          const ni = a.parts[a.parts.length-1];
          if (ni !== tip){ a.bonds.add(tip, ni, 8, .9*a.g.cohesion); prole[ni]=2; pcol[ni]=1; pr[ni]=3.4; prole[tip]=0; pcol[tip]=0; pr[tip]=1.8; }
        }
      }
      break; }

    case T.INVADER: {
      const me = a.parts[0];
      if (!alive[me]){ autos.delete(a.id); return; }
      if (!a.host){
        const tgt = nearestAuto(a, v => v.type !== T.INVADER && v.parts.length > 5, a.g.sense*2.5);
        if (tgt){ moveToward(a, tgt.x, tgt.y, .16*a.g.aggro);
          if ((tgt.x-a.x)**2 + (tgt.y-a.y)**2 < 300){ a.host = tgt.id; a.injected = 0; a.state = S.GATHER; }
        } else { a.wob += dt*3; moveToward(a, a.x+Math.cos(a.wob)*50, a.y+Math.sin(a.wob*1.4)*50, .1); }
      } else {
        const h = autos.get(a.host);
        if (!h){ a.host = null; break; }
        // stay attached, inject and hijack
        moveToward(a, h.x, h.y, .3);
        a.injected += dt * a.g.hunger;
        pcol[me] = (a.t*8|0)%2 ? 3 : 1; // pulsing signal
        if (a.injected > 6){
          // LYSIS: burst the host
          const c = Math.min(4, 1 + (h.parts.length/6|0));
          for (let k = 0; k < c; k++) new Auto(T.INVADER, h.x+rr(-10,10), h.y+rr(-10,10), a);
          disintegrate(h);
          // burst flash
          bursts.push({x:h.x, y:h.y, t:0});
          a.host = null; a.injected = 0; a.state = S.IDLE;
        }
      }
      break; }

    case T.ABSORBER: {
      // chase and swallow smaller assemblies whole
      const tgt = nearestAuto(a, v => v.parts.length < a.parts.length*.6 &&
        v.type !== T.PRODUCER && v.type !== T.FILAMENT &&
        (v.type === a.g.prefType ? true : rnd() < .8), a.g.sense*2);
      if (tgt){
        a.state = S.GATHER;
        moveToward(a, tgt.x, tgt.y, .05*a.g.aggro);
        if ((tgt.x-a.x)**2+(tgt.y-a.y)**2 < (20*a.g.size)**2){
          // engulf: absorb all its particles
          const ids = tgt.parts.slice();
          for (const i of ids) if (alive[i]) stealParticle(a, i);
          autos.delete(tgt.id);
        }
      } else {
        a.state = S.IDLE;
        a.wob += dt*.5;
        moveToward(a, a.x+Math.cos(a.wob)*50, a.y+Math.sin(a.wob*.8)*50, .02);
      }
      absorbFreeNear(a, a.x, a.y, 26*a.g.size, .1);
      break; }

    case T.COLLECTIVE: {
      // deformable membrane; extends pseudopods to engulf small assemblies
      const tgt = nearestAuto(a, v => v.parts.length < 14 && v.type !== T.PRODUCER, a.g.sense*2.5);
      if (tgt){
        a.state = S.GATHER;
        moveToward(a, tgt.x, tgt.y, .02);
        // pseudopod: the 4 membrane particles nearest the target stretch toward it
        const near = a.parts.filter(i=>alive[i])
          .sort((i,j)=>((px[i]-tgt.x)**2+(py[i]-tgt.y)**2)-((px[j]-tgt.x)**2+(py[j]-tgt.y)**2))
          .slice(0,4);
        for (const i of near){
          const dx = tgt.x-px[i], dy = tgt.y-py[i], d = Math.hypot(dx,dy)||1;
          nudge(i, dx/d*.9, dy/d*.9);
          if (d < 14){ // engulfed
            const ids = tgt.parts.slice();
            for (const q of ids) if (alive[q]) stealParticle(a, q);
            autos.delete(tgt.id);
            break;
          }
        }
      }
      absorbFreeNear(a, a.x, a.y, 40*a.g.size, .08);
      // fragment if too big
      if (a.parts.length > 70) { a.state = S.SPLIT; a.splitT = 2.5; }
      break; }
  }

  /* ---- emergent aggregation: nearby small same-kind bodies attract ----
     If several capsules/scavengers/absorbers cluster tightly, they fuse into
     a COLLECTIVE whose membrane is made of their particles. */
  if ((a.type === T.CAPSULE || a.type === T.ABSORBER) && a.state === S.IDLE){
    const kin = nearestAuto(a, v => v.type === a.type && v.state === S.IDLE, 90);
    if (kin){
      moveToward(a, kin.x, kin.y, .015); // gentle attraction between kin
      let clus = 0;
      for (const v of autos.values())
        if (v.type === a.type && (v.x-a.x)**2+(v.y-a.y)**2 < 60*60) clus++;
      if (clus >= 3 && rnd() < 0.002 && !Array.from(autos.values()).some(v=>v.type===T.COLLECTIVE && (v.x-a.x)**2+(v.y-a.y)**2 < 300*300)){
        // fuse cluster into a collective
        const members = Array.from(autos.values())
          .filter(v => v.type === a.type && (v.x-a.x)**2+(v.y-a.y)**2 < 70*70);
        const col = new Auto(T.COLLECTIVE, a.x, a.y, null);
        for (const m of members){
          const ids = m.parts.slice();
          for (const i of ids) if (alive[i]) stealParticle(col, i);
          autos.delete(m.id);
        }
      }
    }
  }

  // longevity
  a.g.life -= dt;
  if (a.g.life <= 0){ a.state = S.MALF; a.malfT = 99; a.g.leak *= 2; a.g.life = 99; }
}

/* ---------------- Rendering ---------------- */
const bursts = [];
function stateGlow(a){
  switch(a.state){
    case S.GATHER: return 1.25;
    case S.FULL: case S.SPLIT: return 1.5 + Math.sin(a.t*9)*.3;
    case S.MALF: return .7 + Math.sin(a.t*14)*.25;
    default: return 1;
  }
}
function render(){
  // trail: translucent black wash
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(0,0,0,${Math.max(.04, P.trail)})`;
  ctx.fillRect(0,0,W,H);

  ctx.save();
  // camera: zoom about centre + pan offset
  ctx.translate(W/2, H/2); ctx.scale(P.zoom, P.zoom); ctx.translate(-cam.x, -cam.y);
  ctx.globalCompositeOperation = 'lighter';
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // membranes + dash bodies as smooth polylines
  for (const a of autos.values()){
    const glow = stateGlow(a);
    const col = a.state === S.MALF ? PAL.red : PALARR[
      a.type===T.FILAMENT?0 : a.type===T.PRODUCER?2 : a.type===T.ABSORBER||a.type===T.COLLECTIVE?4 :
      a.type===T.INVADER?3 : 0];
    if (a.type === T.CAPSULE || a.type === T.FILAMENT){
      // dash body: smooth open polyline through particles
      ctx.strokeStyle = col; ctx.globalAlpha = .5*glow; ctx.lineWidth = 2.2;
      ctx.beginPath();
      let started = false, lx=0, ly=0;
      for (const i of a.parts){ if (!alive[i]) continue;
        const gap = started && ((px[i]-lx)**2 + (py[i]-ly)**2 > 60*60);
        if (!started || gap){ ctx.moveTo(px[i], py[i]); started = true; }
        else ctx.quadraticCurveTo(lx, ly, (lx+px[i])/2, (ly+py[i])/2);
        lx = px[i]; ly = py[i];
      }
      if (started) ctx.lineTo(lx, ly);
      ctx.stroke();
    } else if (a.type === T.ABSORBER || a.type === T.COLLECTIVE || a.type === T.PRODUCER){
      // membrane: smooth closed contour through ring particles (role 1)
      const ring = [];
      for (const i of a.parts) if (alive[i] && prole[i] === 1) ring.push(i);
      if (ring.length > 2){
        ring.sort((i,j)=>Math.atan2(py[i]-a.y,px[i]-a.x)-Math.atan2(py[j]-a.y,px[j]-a.x));
        ctx.strokeStyle = col; ctx.globalAlpha = .45*glow; ctx.lineWidth = 2;
        ctx.beginPath();
        const n = ring.length;
        let pen = false;
        for (let k = 0; k <= n; k++){
          const i = ring[k%n], j = ring[(k+1)%n];
          const mx = (px[i]+px[j])/2, my = (py[i]+py[j])/2;
          // if consecutive points are too far apart, lift the pen (avoids giant membranes)
          if ((px[j]-px[i])**2 + (py[j]-py[i])**2 > 60*60){ pen = false; continue; }
          if (!pen){ ctx.moveTo(mx,my); pen = true; }
          else ctx.quadraticCurveTo(px[i],py[i],mx,my);
        }
        ctx.stroke();
      }
    } else if (a.type === T.VORTEX || a.type === T.GRABBER || a.type === T.SCAVENGER){
      // arms as thin dashes: draw bond segments
      ctx.strokeStyle = col; ctx.globalAlpha = .4*glow; ctx.lineWidth = 1.6;
      ctx.beginPath();
      const b = a.bonds;
      for (let k = 0; k < b.a.length; k++){
        const i=b.a[k], j=b.b[k];
        if (!alive[i]||!alive[j]) continue;
        ctx.moveTo(px[i],py[i]); ctx.lineTo(px[j],py[j]);
      }
      ctx.stroke();
    }
  }

  // dots — batched by colour to minimise state changes
  for (let c = 0; c < 5; c++){
    ctx.fillStyle = PALARR[c];
    ctx.beginPath();
    for (let i = 0; i < MAXP; i++){
      if (!alive[i] || pcol[i] !== c) continue;
      const r = pr[i] * (prole[i]===2 ? 1.15 + Math.sin((i*13+performance.now()*.004))*.12 : 1);
      ctx.moveTo(px[i]+r, py[i]);
      ctx.arc(px[i], py[i], r, 0, 6.2832);
    }
    ctx.globalAlpha = c===1 ? .95 : .8;
    ctx.fill();
    // internal highlight for cores/tips (role 2): bright inner dot
    if (c === 1) continue;
  }
  // luminous halos on tips/cores
  ctx.fillStyle = PAL.cream; ctx.globalAlpha = .18;
  ctx.beginPath();
  for (let i = 0; i < MAXP; i++){
    if (!alive[i] || prole[i] !== 2) continue;
    ctx.moveTo(px[i]+pr[i]*3, py[i]);
    ctx.arc(px[i], py[i], pr[i]*3, 0, 6.2832);
  }
  ctx.fill();

  // lysis bursts
  for (let k = bursts.length-1; k >= 0; k--){
    const b = bursts[k]; b.t += .05;
    if (b.t > 1){ bursts.splice(k,1); continue; }
    ctx.strokeStyle = PAL.red; ctx.globalAlpha = (1-b.t)*.8; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.t*46, 0, 6.2832); ctx.stroke();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

/* ---------------- Interaction & camera ---------------- */
const cam = { x: W/2, y: H/2 };   // world point at screen centre
function clampCam(){
  P.zoom = Math.min(4, Math.max(.5, P.zoom));
  const hw = W/(2*P.zoom), hh = H/(2*P.zoom);
  cam.x = Math.min(W - hw + 60, Math.max(hw - 60, cam.x));
  cam.y = Math.min(H - hh + 60, Math.max(hh - 60, cam.y));
}
function screenToWorld(x, y){
  return [ (x - W/2)/P.zoom + cam.x, (y - H/2)/P.zoom + cam.y ];
}
function disturb(x, y, drag){
  const [wx, wy] = screenToWorld(x, y);
  if (!drag && rnd() < .9){ // tap: burst of free material
    for (let k = 0; k < 12; k++){
      const ang = rnd()*Math.PI*2, d = rr(2,18);
      spawnP(wx+Math.cos(ang)*d, wy+Math.sin(ang)*d, rr(1.2,2.4), rnd()<.6?2:1, -1, 0);
    }
  }
  forNeigh(wx, wy, 70, (j)=>{
    const dx = px[j]-wx, dy = py[j]-wy, d = Math.hypot(dx,dy)||1;
    if (d < 70) nudge(j, dx/d * (70-d)*.09, dy/d * (70-d)*.09);
  });
}
// ---- mouse: left = disturb, right-drag = pan, wheel = zoom ----
let leftDown = false, rightDown = false, lastMX = 0, lastMY = 0;
cv.addEventListener('contextmenu', e => e.preventDefault());
cv.addEventListener('mousedown', e => {
  lastMX = e.clientX; lastMY = e.clientY;
  if (e.button === 2) rightDown = true;
  else { leftDown = true; disturb(e.clientX, e.clientY, false); }
});
window.addEventListener('mousemove', e => {
  if (rightDown){
    cam.x -= (e.clientX - lastMX)/P.zoom;
    cam.y -= (e.clientY - lastMY)/P.zoom;
    clampCam();
  } else if (leftDown) disturb(e.clientX, e.clientY, true);
  lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => { leftDown = false; rightDown = false; });
cv.addEventListener('wheel', e => {
  e.preventDefault();
  // zoom toward the cursor position
  const [wx, wy] = screenToWorld(e.clientX, e.clientY);
  P.zoom *= (e.deltaY < 0 ? 1.08 : .93);
  clampCam();
  const [wx2, wy2] = screenToWorld(e.clientX, e.clientY);
  cam.x += wx - wx2; cam.y += wy - wy2;
  clampCam();
}, { passive:false });
// ---- touch: one finger = disturb, two fingers = pinch zoom + pan ----
let pinchD = 0, pinchMX = 0, pinchMY = 0, touchPan = false;
cv.addEventListener('touchstart', e => {
  if (e.touches.length === 2){
    touchPan = true;
    pinchD = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                        e.touches[0].clientY-e.touches[1].clientY);
    pinchMX = (e.touches[0].clientX+e.touches[1].clientX)/2;
    pinchMY = (e.touches[0].clientY+e.touches[1].clientY)/2;
  } else if (e.touches.length === 1 && !touchPan){
    disturb(e.touches[0].clientX, e.touches[0].clientY, false);
  }
}, { passive:true });
cv.addEventListener('touchmove', e => {
  if (e.touches.length === 2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                         e.touches[0].clientY-e.touches[1].clientY);
    const mx = (e.touches[0].clientX+e.touches[1].clientX)/2;
    const my = (e.touches[0].clientY+e.touches[1].clientY)/2;
    if (pinchD){
      P.zoom *= d/pinchD;               // pinch = zoom
      cam.x -= (mx - pinchMX)/P.zoom;   // midpoint drag = pan
      cam.y -= (my - pinchMY)/P.zoom;
      clampCam();
    }
    pinchD = d; pinchMX = mx; pinchMY = my;
  } else if (e.touches.length === 1 && !touchPan){
    disturb(e.touches[0].clientX, e.touches[0].clientY, true);
  }
}, { passive:true });
cv.addEventListener('touchend', e => {
  if (e.touches.length < 2){ pinchD = 0; if (e.touches.length === 0) touchPan = false; }
});
window.addEventListener('resize', () => { cam.x = W/2; cam.y = H/2; clampCam(); });

/* ---------------- Control panel ---------------- */
const panel = document.getElementById('panel');
const toggle = document.getElementById('panelToggle');
toggle.addEventListener('click', () => panel.classList.toggle('open'));

const sliders = [
  ['Forces', null],
  ['repulsion','Repulsion',0,3,.05,
    'Short-range push between particles. Higher values give structures more volume and keep bodies from overlapping; very high values make everything jittery and loose.'],
  ['attraction','Attraction',0,3,.05,
    'Global multiplier on all elastic bonds. Higher values pull assemblies tighter together; low values make bodies floppy and easier to tear apart.'],
  ['stiffness','Membrane stiffness',0,3,.05,
    'Rigidity of springs inside membranes and chains. High = firm, well-defined shapes. Low = soft, wobbly, deformable bodies that break more easily.'],
  ['noise','Brownian noise',0,3,.05,
    'Random thermal jitter applied to every particle. Gives the medium an organic, microscopic feel. Too high and structures shake themselves apart.'],
  ['nVortex','Vortices',0,10,1,
    'Crown-armed collectors that spin an inward current pulling free material to their core. Applied on Reset.'],
  ['Dynamics', null],
  ['speedMul','Global speed',0.1,3,.05,
    'Time multiplier for the whole simulation. Affects movement, behaviours and timers equally. Randomised on each Reset.'],
  ['consumeRate','Consumption rate',0.1,3,.05,
    'How fast automatons absorb material: filtration radius, bite speed of scavengers, and tip-ripping speed of grabbers all scale with this.'],
  ['fullness','Fullness threshold',0.3,3,.05,
    'How much material an automaton must accumulate before it enters the splitting phase. Higher = bigger, rarer organisms. Lower = small ones that divide often.'],
  ['divisionRate','Division rate',0.1,3,.05,
    'Directly scales how easily automatons divide. Above 1 they split with less material (population booms); below 1 divisions become rare and bodies grow large.'],
  ['collideMalf','Collision dysfunction',0,2,.05,
    'Chance that physical contact between two different automatons damages one of them, sending it into malfunction (leaking material). 0 disables collision damage; high values make the world violent and leaky.'],
  ['mutation','Mutation level',0,3,.05,
    'Size of the random Gaussian variation applied to a child\u2019s parameters when an automaton splits. Drives visible evolutionary drift over time.'],
  ['producerRate','Producer spawn rate',0,4,.05,
    'How quickly stationary producers emit new free material. This is the main energy input of the ecosystem \u2014 raise it to feed everything, lower it to starve the world.'],
  ['Initial populations (apply on Reset)', null],
  ['nProducer','Producers',0,12,1,'Anchored generators that create free material. The base of the food chain.'],
  ['nCapsule','Capsules',0,40,1,'Slow elongated drifters that filter free material from the water.'],
  ['nScavenger','Scavengers',0,30,1,'Small fast automatons that tear particles from the edges of larger bodies.'],
  ['nGrabber','Grabbers',0,10,1,'Floating balls with hanging arms that rip the luminous tips off filaments.'],
  ['nFilament','Filaments',0,30,1,'Anchored waving dashes with a bright material-rich tip \u2014 favourite prey of grabbers.'],
  ['nInvader','Invaders',0,20,1,'Tiny parasites that attach to a host, inject material, replicate inside and burst it (lysis).'],
  ['nAbsorber','Absorbers',0,12,1,'Membrane rings that chase and swallow smaller assemblies whole. Can fuse into collectives.'],
  ['nFree','Free material',0,800,10,'Loose drifting particles present at start \u2014 the initial resource pool.'],
];
// build collapsible sections
let html = '', secId = 0, open = true;
for (const s of sliders){
  if (s[1] === null){
    if (secId > 0) html += '</div>';
    secId++;
    html += `<h3 class="sec" data-sec="${secId}">${s[0]} <span class="chev">▾</span></h3><div class="secBody" id="sec_${secId}">`;
    continue;
  }
  const [key, name, mn, mx, st, desc] = s;
  html += `<label><span class="help" data-desc="${desc.replace(/"/g,'&quot;')}">?</span> ${name}
    <span class="val" id="v_${key}">${P[key]}</span>
    <input type="range" id="s_${key}" min="${mn}" max="${mx}" step="${st}" value="${P[key]}"></label>`;
}
html += '</div>';
html += `<h3 class="sec" data-sec="99">Seed &amp; actions <span class="chev">▾</span></h3><div class="secBody" id="sec_99">
  <input type="number" id="seedIn" value="${SEED}">
  <div class="btns">
    <button id="btnPause">Pause</button>
    <button id="btnReset">Reset</button>
    <button id="btnRandom">Randomize all</button>
  </div>
  <div class="btns">
    <button id="btnExport">Export JSON</button>
    <button id="btnImport">Import JSON</button>
  </div>
  <input type="file" id="importFile" accept=".json,application/json" style="display:none">
</div>
`;
panel.innerHTML = html;

// section collapse
panel.querySelectorAll('h3.sec').forEach(h => {
  h.style.cursor = 'pointer';
  h.addEventListener('click', () => {
    const body = document.getElementById('sec_' + h.dataset.sec);
    const hidden = body.style.display === 'none';
    body.style.display = hidden ? '' : 'none';
    h.querySelector('.chev').textContent = hidden ? '▾' : '▸';
  });
});
// collapse populations by default to keep the panel short
(() => { const h = panel.querySelectorAll('h3.sec')[2];
  if (h) h.click(); })();

// help popups
const tip = document.getElementById('tip');
tip.style.cssText = 'display:none;position:fixed;z-index:20;max-width:240px;background:#12181b;'+
  'border:1px solid #e09f3e;border-radius:8px;padding:10px;color:#fff3b0;font:11px/1.5 monospace;'+
  'box-shadow:0 4px 18px rgba(0,0,0,.6);touch-action:auto';
let tipOpen = false;
panel.querySelectorAll('.help').forEach(el => {
  el.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;'+
    'width:22px;height:22px;min-width:22px;min-height:22px;padding:0;'+
    'border:1px solid #335c67;border-radius:50%;color:#e09f3e;cursor:pointer;margin-right:2px;'+
    'font-size:10px;touch-action:auto;-webkit-tap-highlight-color:rgba(224,159,62,.3)';
  function showTip(e) {
    e.stopPropagation();
    e.preventDefault();
    tip.textContent = el.dataset.desc;
    tip.style.display = 'block';
    tipOpen = true;
    const r = el.getBoundingClientRect();
    tip.style.left = Math.min(window.innerWidth - 260, Math.max(8, r.left - 120)) + 'px';
    tip.style.top = (r.bottom + 8) + 'px';
  }
  el.addEventListener('pointerdown', showTip);
  el.addEventListener('click', showTip);
});
function closeTip(e) {
  if (!tipOpen) return;
  if (e.target.classList && e.target.classList.contains('help')) return;
  if (tip.contains(e.target)) return;
  tip.style.display = 'none';
  tipOpen = false;
}
document.addEventListener('pointerdown', closeTip);
document.addEventListener('click', closeTip);

for (const s of sliders){
  if (s[1] === null) continue;
  const key = s[0], el = document.getElementById('s_'+key);
  el.addEventListener('input', () => {
    P[key] = parseFloat(el.value);
    document.getElementById('v_'+key).textContent = P[key];
  });
}
function refreshSliders(){
  for (const s of sliders){
    if (s[1] === null) continue;
    const key = s[0], el = document.getElementById('s_'+key);
    if (!el) continue;
    el.value = P[key];
    document.getElementById('v_'+key).textContent =
      Number.isInteger(P[key]) ? P[key] : P[key].toFixed(2);
  }
}
function syncPanel(){} // zoom no longer shown in the panel

document.getElementById('btnPause').addEventListener('click', function(){
  P.paused = !P.paused; this.textContent = P.paused ? 'Resume' : 'Pause';
});
document.getElementById('btnReset').addEventListener('click', () => {
  SEED = parseInt(document.getElementById('seedIn').value) || SEED;
  seedWorld();
});
document.getElementById('btnRandom').addEventListener('click', () => {
  SEED = (Math.random()*1e9)|0;
  document.getElementById('seedIn').value = SEED;
  for (const s of sliders){
    if (s[1] === null) continue;
    const [key,,mn,mx] = s;
    if (key.startsWith('n')) continue;
    P[key] = mn + Math.random()*(mx-mn)*.7;
  }
  refreshSliders();
  seedWorld();
});
// ---- export / import settings as JSON ----
document.getElementById('btnExport').addEventListener('click', () => {
  const data = { seed: SEED, params: {} };
  for (const s of sliders){ if (s[1] !== null) data.params[s[0]] = P[s[0]]; }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'microcosmos-settings.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
});
document.getElementById('btnImport').addEventListener('click', () =>
  document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.params) for (const k in data.params)
        if (k in P && typeof data.params[k] === 'number') P[k] = data.params[k];
      if (typeof data.seed === 'number'){
        SEED = data.seed;
        document.getElementById('seedIn').value = SEED;
      }
      refreshSliders();
      seedWorld();
    } catch (err) { alert('Invalid settings file'); }
  };
  reader.readAsText(f);
  e.target.value = '';
});

/* ---------------- Main loop with FPS-adaptive population cap ---------------- */
const fpsEl = document.getElementById('fps');
let last = performance.now(), acc = 0, frames = 0, fps = 60, fpsT = 0;
function loop(now){
  requestAnimationFrame(loop);
  let dt = (now - last) / 1000; last = now;
  if (dt > .1) dt = .1;          // tab-return clamp
  frames++; fpsT += dt;
  if (fpsT >= 1){
    fps = frames / fpsT; frames = 0; fpsT = 0;
    // dynamic population cap
    if (fps < 45 && popCap > 700) popCap = Math.floor(popCap * .88);
    else if (fps > 55 && popCap < MAXP - 200) popCap = Math.floor(popCap * 1.04);
    // if over cap, cull excess free material first
    let excess = liveCount - popCap;
    for (let i = 0; i < MAXP && excess > 0; i++)
      if (alive[i] && powner[i] === -1){ killP(i); excess--; }
    fpsEl.textContent = `${fps|0} fps · ${liveCount} particles · ${autos.size} automatons`;
  }
  if (!P.paused){
    const step = Math.min(dt * P.speedMul, .033) ;
    // behaviour at frame rate, physics possibly substepped for stability
    for (const a of Array.from(autos.values())) behave(a, step);
    physics(step);
  }
  render();
}
seedWorld();
requestAnimationFrame(loop);
</script>
